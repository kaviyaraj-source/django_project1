{% extends 'shop/leyouts/main.html' %}

{% block title %}
shop/home
{% endblock title %}


{% block content %}
{% include 'shop/inc/slider.html' %}
<div class="container" style="margin-top: 80px;">
  <div class="row">
    <div class="col-12">
      <h4 class="mb-3">Lastest Offers </h4>
      <hr style="border-color: #b8bfc2;">
    </div>
    {% for item in products %}
    <div class="col-md-4 col-lg-3">
      <div class="card my-3">
        <img src="{{ item.product_image.url }}" style="width:260px; height:300px;" class="card-img-top" alt="Categories">
        <a href="{% url 'product_details' item.category.name item.name %}">

          <div class="card-body">
            <h5 class="card-title ">{{item.name}}</h5>
            <p class="card-text">
              <span class="float-start old_price"><s>Rs.{{ item.original_price}}</s></span>
              <span class="float-end new_price">Rs.{{ item.selling_price}}</s></span>

            </p>
          </div>

        </a>
      </div>
    </div>
    {% endfor %}

  </div>
</div>
{% endblock content %}
